{# Sidebar lateral compartilhada (JB Proteção). Incluída pelos dashboards.
   O item ativo é detectado automaticamente pela URL (script no rodapé). #}
<style>
  :root{ --jb-side-w:248px; }

  .jb-side{
    position:fixed; top:0; left:0; height:100vh; width:var(--jb-side-w);
    display:flex; flex-direction:column;
    background:linear-gradient(180deg,#0c1019 0%,#080b12 100%);
    border-right:1px solid rgba(255,255,255,.06);
    box-shadow:4px 0 34px rgba(0,0,0,.4);
    z-index:9990; padding:22px 16px;
    font-family:'Plus Jakarta Sans',-apple-system,'Segoe UI',Roboto,Arial,sans-serif;
    transition:transform .28s cubic-bezier(.4,0,.2,1);
  }
  /* halo laranja sutil no topo da sidebar */
  .jb-side::before{
    content:''; position:absolute; top:-120px; left:-40px; width:300px; height:260px;
    background:radial-gradient(ellipse, rgba(249,115,22,.14), transparent 70%);
    pointer-events:none;
  }

  .jb-side__brand{ position:relative; display:flex; align-items:center; gap:14px; padding:4px 8px 24px; }
  .jb-side__brand img{ height:46px; width:auto; }
  .jb-side__brand .wm b{ display:block; font-size:16px; font-weight:800; letter-spacing:.4px; line-height:1; color:rgba(255,255,255,.96); }
  .jb-side__brand .wm small{ display:block; font-size:9.5px; font-weight:700; letter-spacing:.26em; color:#fb923c; margin-top:5px; text-transform:uppercase; }

  .jb-side__label{
    font-size:9.5px; letter-spacing:.22em; text-transform:uppercase; color:#566072;
    font-weight:800; padding:6px 12px; margin-top:2px;
    font-family:ui-monospace,"Cascadia Code",Consolas,monospace;
  }

  .jb-side__nav{ display:flex; flex-direction:column; gap:5px; margin-top:4px; }

  .jb-nav-item{
    position:relative; display:flex; align-items:center; gap:12px;
    padding:11px 12px; border-radius:12px;
    color:#aeb6c4; font-size:13.5px; font-weight:700; text-decoration:none;
    border:1px solid transparent; transition:all .15s;
  }
  .jb-nav-item svg{ width:18px; height:18px; stroke:currentColor; flex:0 0 18px; }
  .jb-nav-item:hover{ background:rgba(255,255,255,.045); color:#fff; }
  .jb-nav-item.active{
    background:linear-gradient(135deg,rgba(249,115,22,.20),rgba(249,115,22,.05));
    border-color:rgba(249,115,22,.35); color:#fff;
  }
  .jb-nav-item.active svg{ stroke:#fb923c; }
  .jb-nav-item.active::before{
    content:''; position:absolute; left:-16px; top:50%; transform:translateY(-50%);
    width:4px; height:22px; border-radius:0 4px 4px 0;
    background:linear-gradient(180deg,#fb923c,#f97316);
  }

  .jb-side__foot{
    margin-top:auto; display:flex; flex-direction:column; gap:12px;
    padding-top:16px; border-top:1px solid rgba(255,255,255,.06);
  }
  .jb-logout{
    display:flex; align-items:center; gap:12px; padding:11px 12px; border-radius:12px;
    color:#8b93a5; font-size:13px; font-weight:700; text-decoration:none; transition:all .15s;
  }
  .jb-logout svg{ width:18px; height:18px; stroke:currentColor; }
  .jb-logout:hover{ background:rgba(239,68,68,.10); color:#f87171; }
  .jb-side__ver{
    display:flex; align-items:center; gap:8px; padding:0 12px;
    font-size:10.5px; color:#566072; font-family:ui-monospace,"Cascadia Code",Consolas,monospace;
  }
  .jb-side__ver i{ width:7px; height:7px; border-radius:50%; background:#2ecc71; box-shadow:0 0 8px rgba(46,204,113,.8); }

  /* hamburguer + overlay (mobile) */
  .jb-burger{
    position:fixed; top:14px; left:14px; z-index:9992; display:none;
    width:42px; height:42px; border-radius:12px;
    border:1px solid rgba(255,255,255,.1); background:rgba(13,17,26,.92);
    color:#fff; cursor:pointer; align-items:center; justify-content:center;
    backdrop-filter:blur(6px);
  }
  .jb-burger svg{ width:20px; height:20px; stroke:#fff; }
  .jb-overlay{ position:fixed; inset:0; background:rgba(2,6,12,.6); backdrop-filter:blur(2px); z-index:9989; display:none; }

  /* Desktop largo: sidebar fixa + conteúdo deslocado */
  @media (min-width:1280px){
    body{ padding-left:var(--jb-side-w) !important; }
  }
  /* Até 1279px: sidebar vira menu retrátil (hambúrguer) e o conteúdo
     ocupa a largura toda — evita espremer os cards/gráficos. */
  @media (max-width:1279px){
    .jb-side{ transform:translateX(-100%); }
    .jb-side.open{ transform:translateX(0); }
    .jb-burger{ display:flex; }
    .jb-overlay.show{ display:block; }
    body{ padding-top:60px !important; }   /* espaço pro botão hambúrguer */
  }
</style>

<button class="jb-burger" onclick="document.querySelector('.jb-side').classList.toggle('open');document.querySelector('.jb-overlay').classList.toggle('show');" aria-label="Abrir menu">
  <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
</button>
<div class="jb-overlay" onclick="document.querySelector('.jb-side').classList.remove('open');this.classList.remove('show');"></div>

<aside class="jb-side">

  <div class="jb-side__brand">
    <img src="/static/img/logo_jb_trim.png" alt="JB Proteção Patrimonial">
    <div class="wm">
      <b>Proteção</b>
      <small>Patrimonial</small>
    </div>
  </div>

  <div class="jb-side__label">Navegação</div>
  <nav class="jb-side__nav">

    <a href="/financeiro" class="jb-nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      Financeiro
    </a>

    <a href="/eventos" class="jb-nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Eventos
    </a>

    <a href="/vendas" class="jb-nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
      Vendas
    </a>

  </nav>

  <div class="jb-side__foot">
    <a href="/logout" class="jb-logout">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Sair
    </a>
    <div class="jb-side__ver"><i></i> Sistema online · v2.0.0</div>
  </div>

</aside>

<script>
  (function(){
    var path = window.location.pathname.replace(/\/+$/,'') || '/financeiro';
    document.querySelectorAll('.jb-nav-item').forEach(function(a){
      if (a.getAttribute('href') === path) a.classList.add('active');
    });
  })();
</script>
