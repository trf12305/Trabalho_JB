<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            width:100%;
            height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            background:#07090f;
            font-family:Arial;
            overflow:hidden;
        }

        body::before{
            content:'';
            position:absolute;
            inset:0;
            background:
                linear-gradient(rgba(255,107,0,.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,107,0,.04) 1px, transparent 1px);
            background-size:40px 40px;
        }

        .glow{
            position:absolute;
            top:-200px;
            left:50%;
            transform:translateX(-50%);
            width:700px;
            height:400px;
            background:
                radial-gradient(
                    ellipse,
                    rgba(255,107,0,.14) 0%,
                    transparent 70%
                );
        }

        .login-box{
            position:relative;
            z-index:2;
            width:400px;
            background:#11151f;
            border:1px solid rgba(255,255,255,.06);
            border-radius:20px;
            padding:40px;
            box-shadow:0 0 30px rgba(0,0,0,.45);
        }

        .logo{
            display:flex;
            align-items:center;
            gap:14px;
            margin-bottom:30px;
        }

        .logo-icon{
            width:55px;
            height:55px;
            background:#ff6b00;
            border-radius:14px;
            display:flex;
            align-items:center;
            justify-content:center;
            color:#000;
            font-size:1.4rem;
            font-weight:800;
        }

        .logo-text{
            color:white;
            font-size:1.2rem;
            font-weight:700;
        }

        .logo-text span{
            display:block;
            color:#ff6b00;
            font-size:.8rem;
            margin-top:4px;
        }

        .title{
            color:white;
            font-size:1.5rem;
            font-weight:700;
            margin-bottom:8px;
        }

        .sub{
            color:#6f7787;
            margin-bottom:30px;
            font-size:.9rem;
        }

        .form-group{
            margin-bottom:18px;
        }

        label{
            display:block;
            color:#b8c0d0;
            margin-bottom:8px;
            font-size:.9rem;
        }

        input{
            width:100%;
            background:#1a1f2b;
            border:1px solid rgba(255,255,255,.06);
            height:50px;
            border-radius:12px;
            padding:0 14px;
            color:white;
            outline:none;
        }

        input:focus{
            border-color:#ff6b00;
        }

        button{
            width:100%;
            height:52px;
            border:none;
            border-radius:12px;
            background:#ff6b00;
            color:black;
            font-weight:700;
            cursor:pointer;
            margin-top:10px;
        }

        button:hover{
            opacity:.9;
        }

    </style>

</head>

<body>

    <div class="glow"></div>

    <div class="login-box">

        <div class="logo">

            <div class="logo-icon">
                JB
            </div>

            <div class="logo-text">

                JB Proteção

                <span>Dashboard Executivo</span>

            </div>

        </div>

        <div class="title">
            Entrar
        </div>

        <div class="sub">
            Faça login para acessar o painel
        </div>

        <div
            id="error-msg"
            class="hidden"
            style="margin-bottom:18px; padding:12px 16px; background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.3); border-radius:12px; color:#f87171; font-size:.88rem; font-weight:600;"
        >
            Usuário ou senha inválidos. Tente novamente.
        </div>

        <form action="/login" method="POST">

            <div class="form-group">

                <label>Usuário</label>

                <input
                    type="text"
                    name="usuario"
                    placeholder="Digite o usuário"
                    required
                >

            </div>

            <div class="form-group">

                <label>Senha</label>

                <input
                    type="password"
                    name="senha"
                    placeholder="Digite a senha"
                    required
                >

            </div>

            <button type="submit">
                Entrar no Painel
            </button>

        </form>

    </div>


<script>
    // Mostra erro se o login falhou
    if (new URLSearchParams(window.location.search).get('erro')) {
        document.getElementById('error-msg').classList.remove('hidden');
    }

    // Feedback visual no botão ao submeter
    document.querySelector('form').addEventListener('submit', function () {
        const btn = document.querySelector('button[type="submit"]');
        btn.textContent = 'Entrando...';
        btn.disabled = true;
    });
</script>

</body>

</html>
